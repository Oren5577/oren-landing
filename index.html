<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oren</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #f5efe8;
      color: #3b2d26;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
      background: linear-gradient(to bottom, #e9dfd3, #f5efe8);
    }

    .container {
      max-width: 760px;
    }

    .brand {
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #8a6f5d;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 64px;
      line-height: 1.1;
      margin: 0 0 20px;
      font-weight: normal;
    }

    .subtitle {
      max-width: 620px;
      margin: 0 auto 32px;
      font-size: 19px;
      line-height: 1.8;
      color: #6f5a4d;
    }

    .form {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    input[type="email"] {
      width: 320px;
      max-width: 100%;
      height: 50px;
      border-radius: 999px;
      border: 1px solid #d7c7b8;
      padding: 0 18px;
      font-size: 15px;
      background: rgba(255,255,255,0.9);
    }

    button {
      height: 50px;
      border: none;
      border-radius: 999px;
      padding: 0 24px;
      background: #3b2d26;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .note {
      font-size: 14px;
      color: #8a6f5d;
      margin-top: 10px;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 42px;
      }

      .subtitle {
        font-size: 17px;
      }

      .form {
        flex-direction: column;
        align-items: center;
      }

      input[type="email"],
      button {
        width: 100%;
        max-width: 360px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="container">
      <div class="brand">OREN</div>
      <h1>Hair care,<br>with intention.</h1>
      <p class="subtitle">
        A nourishing ritual designed to restore softness, shine, and calm.
        Thoughtfully made for hair that deserves more than quick fixes.
      </p>

      <div class="form">
        <input type="email" placeholder="Enter your email" />
        <button>Join waitlist</button>
      </div>

      <div class="note">Launching soon in the UAE.</div>
    </div>
  </section>
</body>
</html>
